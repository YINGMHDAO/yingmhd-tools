name: Release

on:
  push:
    branches: [main]

# 创建 Release 和上传产物需要写权限
permissions:
  contents: write

# 同一时间只跑一个发布流程,后触发的排队
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # 检查版本号是否变动:以 package.json 的 version 为准
  # (tauri.conf.json 的 version 指向 package.json,单一版本源),
  # 若 v<version> 标签已存在则跳过发布
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: 检查版本对应的 tag 是否已存在
        id: check
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "tag v$VERSION 已存在,跳过发布"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "版本 $VERSION 尚未发布,开始构建"
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: npm ci

      - name: 构建并发布 Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # __VERSION__ 会被替换为 tauri.conf.json 中的版本号
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: |
            自动构建发布。安装方式见 [README](https://github.com/YINGMHDAO/yingmhd-tools#-安装)。

            > ⚠️ 应用未签名公证,macOS 首次打开请右键 → 打开;Windows SmartScreen 提示时选择「仍要运行」。
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
